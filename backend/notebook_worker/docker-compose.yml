services:
  notebook:
    image: paraspunjabi2002/mlcode_notebook:1.0.0
    container_name: notebook
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: root
      MINIO_SECRET_KEY: password
      USER_ID: PP
      PROBLEM_ID: numpy
    ports:
      - "8888:8888"
    networks:
      - jpt_notebook_net

  minio:
    image: minio/minio:latest
    container_name: minio
    environment:
      MINIO_ROOT_USER: root
      MINIO_ROOT_PASSWORD: password
    ports:
      - "9000:9000"
      - "9090:9090"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9090"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - jpt_notebook_net

volumes:
  minio_data:

networks:
  jpt_notebook_net:
    driver: bridge
