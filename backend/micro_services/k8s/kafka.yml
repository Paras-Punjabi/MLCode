#! Kafka ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-config
  namespace: mlcode
data:
  KAFKA_NODE_ID: "1"
  KAFKA_PROCESS_ROLES: "broker,controller"

  KAFKA_LISTENERS: >
    INTERNAL://0.0.0.0:9092,
    EXTERNAL://0.0.0.0:29092,
    CONTROLLER://0.0.0.0:9093

  KAFKA_ADVERTISED_LISTENERS: >
    INTERNAL://kafka:9092,
    EXTERNAL://localhost:29092

  KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: >
    INTERNAL:PLAINTEXT,
    EXTERNAL:PLAINTEXT,
    CONTROLLER:PLAINTEXT

  KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
  KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"

  KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"

  KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
  KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
  KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
  KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
  KAFKA_NUM_PARTITIONS: "3"
  KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
  KAFKAJS_NO_PARTITIONER_WARNING: "1"

---

#! Kafka StorageClass
kind: StorageClass
apiVersion: storage.k8s.io/v1
metadata:
  name: kafka-storage
  namespace: mlcode
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true

---

#! Kafka PersistentVolume 
kind: PersistentVolume
apiVersion: v1
metadata:
  name: kafka-pv
  namespace: mlcode
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: kafka-storage
  hostPath:
    path: /mnt/data/kafka
    type: DirectoryOrCreate
    
---

#! Kafka PersistentVolumeClaim 
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: kafka-pvc
  namespace: mlcode
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: kafka-storage

--- 

#! Kafka Deployment
kind: Deployment
apiVersion: apps/v1
metadata:
  name: kafka-deployment
  namespace: mlcode
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-pod
  template:
    metadata:
      labels:
        app: kafka-pod
    spec:
      containers:
        - name: kafka
          image: apache/kafka:latest
          envFrom:
          - configMapRef:
              name: kafka-config
          ports:
            - containerPort: 9092
            - containerPort: 9093
            - containerPort: 29092
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1"
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data
      volumes:
        - name: kafka-data
          persistentVolumeClaim:
            claimName: kafka-pvc

---

#! Kafka Service
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: mlcode
spec:
  type: ClusterIP
  selector:
    app: kafka-pod
  ports:
    - name: internal
      port: 9092
      targetPort: 9092
    - name: controller
      port: 9093
      targetPort: 9093
    - name: external
      port: 29092
      targetPort: 29092
