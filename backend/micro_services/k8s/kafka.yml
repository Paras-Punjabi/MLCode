#! Kafka StorageClass
kind: StorageClass
apiVersion: storage.k8s.io/v1
metadata:
  name: kafka-storage
  namespace: mlcode
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true

---

#! Kafka PersistentVolume 
kind: PersistentVolume
apiVersion: v1
metadata:
  name: kafka-pv
  namespace: mlcode
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: kafka-storage
  hostPath:
    path: /mnt/data/kafka
    type: DirectoryOrCreate
    
---

#! Kafka PersistentVolumeClaim 
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: kafka-pvc
  namespace: mlcode
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: kafka-storage

--- 

#! Kafka Deployment
kind: Deployment
apiVersion: apps/v1
metadata:
  name: kafka-deployment
  namespace: mlcode
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-pod
  template:
    metadata:
      labels:
        app: kafka-pod
    spec:
      containers:
        - name: kafka
          image: apache/kafka:latest
          envFrom:
          - configMapRef:
              name: mlcode-config
          ports:
            - containerPort: 9092
            - containerPort: 9093
            - containerPort: 29092
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1"
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data
      volumes:
        - name: kafka-data
          persistentVolumeClaim:
            claimName: kafka-pvc

---

#! Kafka Service
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: mlcode
spec:
  type: ClusterIP
  selector:
    app: kafka-pod
  ports:
    - name: internal
      port: 9092
      targetPort: 9092
    - name: controller
      port: 9093
      targetPort: 9093
    - name: external
      port: 29092
      targetPort: 29092
