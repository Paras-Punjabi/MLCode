kind: PersistentVolume
apiVersion: v1
metadata:
  name: postgres-pv
  namespace: mlcode
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: postgres-storage
  hostPath:
    path: /mnt/data/postgres
    type: DirectoryOrCreate
    
